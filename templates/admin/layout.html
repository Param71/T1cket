{% extends "base.html" %}

{% block extra_head %}
<style>
/* Admin Layout */
.admin-shell { display: flex; flex: 1; overflow: hidden; border-radius: 32px; }

.admin-sidebar {
    width: 240px; background: var(--frame-bg); border-right: 1px solid var(--input-border);
    display: flex; flex-direction: column; padding: 24px 16px; gap: 4px; flex-shrink: 0;
}
.admin-sidebar .sidebar-brand {
    font-family: 'Syncopate', sans-serif; font-size: 12px; font-weight: 700;
    color: #ff6b35; letter-spacing: 0.1em; padding: 8px 12px; margin-bottom: 16px;
    border-bottom: 1px solid var(--input-border); padding-bottom: 16px;
}
.admin-sidebar a {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px;
    text-decoration: none; color: var(--text-secondary); font-size: 13px; font-weight: 500;
    transition: all 0.2s; letter-spacing: 0.02em;
}
.admin-sidebar a:hover, .admin-sidebar a.active {
    background: var(--bento-bg); color: var(--text-primary);
}
.admin-sidebar a.active { font-weight: 700; }
.admin-sidebar a i { width: 20px; text-align: center; font-size: 14px; }

.admin-main {
    flex: 1; background: var(--bento-bg); overflow-y: auto; padding: 32px 40px;
}
.admin-main::-webkit-scrollbar { width: 6px; }
.admin-main::-webkit-scrollbar-track { background: transparent; }
.admin-main::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 3px; }

.admin-page-title {
    font-family: 'Syncopate', sans-serif; font-size: 24px; font-weight: 700;
    color: var(--text-primary); margin-bottom: 8px;
}
.admin-page-subtitle {
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 32px;
}

/* Stats Cards */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 40px; }
.stat-card {
    background: var(--frame-bg); border: 1px solid var(--input-border); border-radius: 20px;
    padding: 24px; display: flex; flex-direction: column; gap: 8px;
}
.stat-card .stat-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-secondary); font-weight: 700;
}
.stat-card .stat-value {
    font-family: 'Syncopate', sans-serif; font-size: 28px; font-weight: 700;
    color: var(--text-primary);
}

/* Admin Table */
.admin-table-wrap {
    background: var(--frame-bg); border: 1px solid var(--input-border);
    border-radius: 20px; overflow: hidden; margin-bottom: 32px;
}
.admin-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
}
.admin-table th {
    text-align: left; padding: 14px 16px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-secondary); font-weight: 700;
    border-bottom: 1px solid var(--input-border); background: var(--bento-bg);
}
.admin-table td {
    padding: 12px 16px; border-bottom: 1px solid var(--input-border);
    color: var(--text-primary); font-weight: 400;
}
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: rgba(128,128,128,0.04); }

.status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
}
.status-badge.confirmed { background: #0a3622; color: #4ade80; }
.status-badge.cancelled { background: #3b1219; color: #f87171; }

/* Admin Forms */
.admin-form {
    background: var(--frame-bg); border: 1px solid var(--input-border);
    border-radius: 20px; padding: 28px; margin-bottom: 32px;
}
.admin-form h3 {
    font-family: 'Syncopate', sans-serif; font-size: 14px; font-weight: 700;
    color: var(--text-primary); margin-bottom: 20px;
}
.form-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 16px;
}
.admin-form .field label {
    display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-secondary); margin-bottom: 6px; font-weight: 700;
}
.admin-form .field input,
.admin-form .field select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--input-border);
    border-radius: 12px; font-size: 13px; font-family: 'Inter', sans-serif;
    background: var(--bento-bg); color: var(--text-primary); outline: none;
    transition: border-color 0.2s;
}
.admin-form .field input:focus,
.admin-form .field select:focus { border-color: var(--text-primary); }

.btn-add {
    background: #ff6b35; color: #fff; border: none; padding: 10px 24px;
    border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif; letter-spacing: 0.05em; text-transform: uppercase;
    transition: opacity 0.2s;
}
.btn-add:hover { opacity: 0.85; }

.btn-del {
    background: transparent; color: #f87171; border: 1px solid #f87171;
    padding: 6px 14px; border-radius: 10px; font-size: 10px; font-weight: 700;
    cursor: pointer; font-family: 'Inter', sans-serif; text-transform: uppercase;
    letter-spacing: 0.05em; transition: all 0.2s;
}
.btn-del:hover { background: #f87171; color: #fff; }

.empty-msg {
    text-align: center; padding: 40px; color: var(--text-secondary); font-size: 13px;
}
</style>
{% block admin_head %}{% endblock %}
{% endblock %}

{% block content %}
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="sidebar-brand">ADMIN PANEL</div>
        <a href="{{ url_for('admin_dashboard') }}" class="{% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
        </a>
        <a href="{{ url_for('admin_trains') }}" class="{% if request.endpoint == 'admin_trains' %}active{% endif %}">
            <i class="fa-solid fa-train"></i> Trains
        </a>
        <a href="{{ url_for('admin_stations') }}" class="{% if request.endpoint == 'admin_stations' %}active{% endif %}">
            <i class="fa-solid fa-location-dot"></i> Stations
        </a>
        <a href="{{ url_for('admin_schedules') }}" class="{% if request.endpoint == 'admin_schedules' %}active{% endif %}">
            <i class="fa-regular fa-calendar"></i> Schedules
        </a>
        <a href="{{ url_for('admin_users') }}" class="{% if request.endpoint == 'admin_users' %}active{% endif %}">
            <i class="fa-solid fa-users"></i> Users
        </a>
        <a href="{{ url_for('admin_tickets') }}" class="{% if request.endpoint == 'admin_tickets' %}active{% endif %}">
            <i class="fa-solid fa-ticket"></i> Tickets
        </a>
        <div style="flex:1;"></div>
        <a href="{{ url_for('dashboard') }}"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
    </aside>
    <main class="admin-main">
        {% block admin_content %}{% endblock %}
    </main>
</div>
{% endblock %}
